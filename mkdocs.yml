site_name: Jono
site_description: Art Portfolio - Acrylic & Watercolour Paintings

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: DM Sans
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
  favicon: favicon.ico
  logo: photos/Jono.jpg

markdown_extensions:
  - attr_list
  - md_in_html

extra_css:
  - https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css
  - stylesheets/custom.css

plugins:
  - search:
      enabled: false

extra:
  generator: false

nav:
  - Rurban: landscapes.md
  - Surreal: surreal.md
  - Portraits: portraits.md
  - Stories:
    - The Last Holiday: PhotosToPaintings/The Last Holiday/index.md
    - Guggenheim: PhotosToPaintings/Guggenheim/index.md
  - Essays: essays.md
  - About: about.md
