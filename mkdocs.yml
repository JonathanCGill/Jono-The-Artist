site_name: Jono The Artist
site_description: Art Portfolio — Acrylic & Watercolour Paintings

theme:
  name: material
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.top
  favicon: favicon.ico
  logo: favicon.png
  icon:
    logo: material/palette

markdown_extensions:
  - attr_list
  - md_in_html

extra_css:
  - https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap
  - stylesheets/custom.css

plugins:
  - search:
      enabled: false

extra:
  generator: false

nav:
  - Home: index.md
  - Acrylic Paintings: acrylic.md
  - Watercolours: watercolours.md
  - About: about.md
